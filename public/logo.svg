<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 50" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="50%" stop-color="#764ba2"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
  </defs>
  <!-- Icon: Stylized frame/viewport -->
  <rect x="2" y="6" width="36" height="36" rx="6" stroke="url(#iconGrad)" stroke-width="2.8" fill="none"/>
  <rect x="9" y="13" width="22" height="16" rx="2.5" fill="url(#iconGrad)" opacity="0.2"/>
  <rect x="9" y="13" width="22" height="16" rx="2.5" stroke="url(#iconGrad)" stroke-width="1.5" fill="none"/>
  <!-- Camera flash / sparkle -->
  <circle cx="32" cy="12" r="3" fill="url(#iconGrad)"/>
  <line x1="32" y1="6" x2="32" y2="8.5" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="37" y1="12" x2="35" y2="12" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="35.8" y1="8.2" x2="34.3" y2="9.7" stroke="url(#iconGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Bottom bar (device hint) -->
  <rect x="16" y="33" width="8" height="2" rx="1" fill="url(#iconGrad)" opacity="0.6"/>
  <!-- Wordmark -->
  <text x="48" y="34" font-family="'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5">
    <tspan fill="url(#textGrad)">Frame</tspan><tspan fill="#1a1a2e">Shot</tspan>
  </text>
</svg>
